<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StaticRun Test</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: #1e293b;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      h1 {
        margin-bottom: 10px;
        color: #38bdf8;
      }

      p {
        opacity: 0.8;
      }

      .badge {
        margin-top: 20px;
        display: inline-block;
        padding: 8px 16px;
        background: #22c55e;
        color: #022c22;
        border-radius: 999px;
        font-weight: bold;
      }

      button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #38bdf8;
        color: #0f172a;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background: #0ea5e9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🚀 Deployment Successful</h1>
      <!-- <p>If you can see this, your pipeline is working!</p> -->

      <div class="badge">StaticRun Live</div>

      <br />
      <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
      function showMessage() {
        alert("Your GitHub → S3 deployment works perfectly 🎉");
      }
    </script>
  </body>
</html>
